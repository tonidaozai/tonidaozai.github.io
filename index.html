<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shuaiduo Sun | Game Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #ffffff;
      --text-primary: #000000;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border: #e5e5e5;
      --primary: #E60012;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    /* ========== ANIMATIONS ========== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-on-load {
      opacity: 0;
      animation: fadeInUp 0.8s var(--ease-out-expo) forwards;
    }
    
    .animate-delay-1 { animation-delay: 0.1s; }
    .animate-delay-2 { animation-delay: 0.2s; }
    .animate-delay-3 { animation-delay: 0.3s; }
    
    /* Scroll reveal */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s var(--ease-out-expo);
    }
    
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* Hover effects */
    .hover-lift {
      transition: transform 0.3s var(--ease-out-expo);
    }
    
    .hover-lift:hover {
      transform: translateY(-4px);
    }
    
    /* Link underline animation */
    .link-animate {
      position: relative;
      display: inline-block;
    }
    
    .link-animate::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--primary);
      transition: width 0.3s var(--ease-out-expo);
    }
    
    .link-animate:hover::after {
      width: 100%;
    }
    
    html { scroll-behavior: smooth; font-size: 16px; }
    
    body {
      font-family: 'Inter', 'Noto Sans JP', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      font-weight: 400;
    }
    
    /* ========== NAV ========== */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
    }
    
    .logo {
      font-weight: 500;
      font-size: 0.875rem;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    
    /* ========== LANGUAGE SWITCHER ========== */
    .lang-switcher {
      position: fixed;
      right: 4rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .lang-btn {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      background: none;
      border: none;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.5rem 0;
      letter-spacing: 0.1em;
      transition: color 0.2s;
      font-family: inherit;
    }
    
    .lang-btn:hover { color: var(--text-secondary); }
    .lang-btn.active { color: var(--text-primary); }
    
    /* ========== HEADER (COMPACT) ========== */
    .header {
      padding: 8rem 4rem 4rem;
      border-bottom: 1px solid var(--border);
    }
    
    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--border);
      flex-shrink: 0;
    }
    
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .header-info {
      flex: 1;
    }
    
    .name-main {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    
    .role-label {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    
    .header-links {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    
    .header-links a {
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    
    .header-links a:hover {
      color: var(--primary);
    }
    
    .header-links .divider {
      color: var(--border);
      user-select: none;
    }
    
    /* ========== SECTION STYLES ========== */
    .section {
      padding: 5rem 4rem;
      border-bottom: 1px solid var(--border);
    }
    
    .section:last-of-type {
      border-bottom: none;
    }
    
    .section-title {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3rem;
    }
    
    /* ========== WORKS SECTION ========== */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3rem;
    }
    
    .work-item {
      position: relative;
    }
    
    .work-video {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      background: var(--border);
      display: block;
      margin-bottom: 1rem;
    }
    
    .work-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }
    
    .work-desc {
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--text-secondary);
    }
    
    /* ========== ANIMATION SECTION ========== */
    .animation-content {
      max-width: 800px;
    }
    
    .animation-image {
      width: 100%;
      max-width: 600px;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      background: var(--border);
    }
    
    .animation-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    
    .animation-link:hover {
      color: var(--primary);
    }
    
    .animation-link svg {
      width: 16px;
      height: 16px;
    }
    
    /* ========== ART SECTION ========== */
    .art-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }
    
    .art-item {
      aspect-ratio: 1;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .art-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s var(--ease-out-expo);
    }
    
    .art-item:hover img {
      transform: scale(1.05);
    }
    
    /* ========== PERFORMANCE SECTION ========== */
    .performance-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }
    
    .performance-item {
      position: relative;
    }
    
    .performance-photo {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: var(--border);
      border-radius: 4px;
    }
    
    .performance-caption {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    /* ========== FOOTER ========== */
    footer {
      padding: 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .footer-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    
    .footer-links {
      display: flex;
      gap: 2rem;
    }
    
    .footer-links a {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    
    .footer-links a:hover { color: var(--text-primary); }
    
    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      nav { padding: 1.5rem; }
      .lang-switcher { right: 1.5rem; }
      .header { padding: 6rem 1.5rem 3rem; }
      .header-content { flex-direction: column; text-align: center; }
      .avatar { width: 60px; height: 60px; }
      .name-main { font-size: 1.5rem; }
      .header-links { justify-content: center; }
      .section { padding: 3rem 1.5rem; }
      .works-grid { grid-template-columns: 1fr; gap: 2rem; }
      footer {
        padding: 2rem 1.5rem;
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- Language Switcher -->
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="ja">JP</button>
    <button class="lang-btn" data-lang="zh">CN</button>
  </div>

  <!-- Nav -->
  <nav>
    <a href="#" class="logo" data-i18n="logo">Portfolio</a>
  </nav>

  <!-- Compact Header -->
  <header class="header">
    <div class="header-content">
      <div class="avatar animate-on-load">
        <img src="/images/shuaiduosun.jpg" alt="Shuaiduo Sun">
      </div>
      <div class="header-info">
        <h1 class="name-main animate-on-load animate-delay-1" data-i18n="nameMain">Shuaiduo Sun</h1>
        <p class="role-label animate-on-load animate-delay-2" data-i18n="roleLabel">Systems Designer / Level Designer</p>
        <div class="header-links animate-on-load animate-delay-3">
          <a class="link-animate" href="mailto:shuaiduosun@gmail.com">Email</a>
          <span class="divider">|</span>
          <a class="link-animate" href="https://www.linkedin.com/in/%E5%B8%85%E5%A4%9A-%E5%AD%99-316a60124">LinkedIn</a>
          <span class="divider">|</span>
          <a class="link-animate" href="https://space.bilibili.com/6414199">Bilibili</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Works Section -->
  <section class="section">
    <p class="section-title reveal" data-i18n="worksTitle">Game Works</p>
    <div class="works-grid">
      <div class="work-item reveal hover-lift">
        <video class="work-video" poster="/video/yuanmengzhixing-cover-new.webp" controls muted loop playsinline>
          <source src="/video/yuanmengzhixing.mp4" type="video/mp4">
        </video>
        <h3 class="work-title" data-i18n="work1Title">Fun Party</h3>
        <p class="work-desc" data-i18n="work1Desc">Party Game</p>
      </div>
      <div class="work-item reveal hover-lift">
        <video class="work-video" poster="/video/qqxiaowo-cover-new.jpg" controls muted loop playsinline>
          <source src="/video/qqxiaowo.mp4" type="video/mp4">
        </video>
        <h3 class="work-title" data-i18n="work2Title">QQ Home</h3>
        <p class="work-desc" data-i18n="work2Desc">Social Game</p>
      </div>
    </div>
  </section>

  <!-- Animation Section -->
  <section class="section">
    <p class="section-title reveal" data-i18n="animationTitle">Animation Works</p>
    <div class="animation-content reveal">
      <img src="/images/bilibili-showcase.jpg" alt="Bilibili Animation" class="animation-image">
      <a href="https://space.bilibili.com/6414199" target="_blank" class="animation-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
        <span data-i18n="animationLink">View on Bilibili</span>
      </a>
    </div>
  </section>

  <!-- Art Section -->
  <section class="section">
    <p class="section-title reveal" data-i18n="artTitle">Art Portfolio</p>
    <div class="art-gallery reveal">
      <div class="art-item">
        <img src="/images/art-1.jpg" alt="Artwork 1">
      </div>
      <div class="art-item">
        <img src="/images/art-2.jpg" alt="Artwork 2">
      </div>
      <div class="art-item">
        <img src="/images/art-3.jpg" alt="Artwork 3">
      </div>
      <div class="art-item">
        <img src="/images/art-4.jpg" alt="Artwork 4">
      </div>
    </div>
  </section>

  <!-- Performance Section -->
  <section class="section">
    <p class="section-title reveal" data-i18n="performanceTitle">Band Performance</p>
    <div class="performance-gallery reveal">
      <div class="performance-item">
        <img src="/images/performance-1.jpg" alt="Performance 1" class="performance-photo">
        <p class="performance-caption" data-i18n="performance1Caption">Live Performance</p>
      </div>
      <div class="performance-item">
        <img src="/images/performance-2.jpg" alt="Performance 2" class="performance-photo">
        <p class="performance-caption" data-i18n="performance2Caption">Band Show</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p class="footer-text">© 2026 Shuaiduo Sun</p>
    <div class="footer-links">
      <a class="link-animate" href="mailto:shuaiduosun@gmail.com">Email</a>
      <a class="link-animate" href="https://www.linkedin.com/in/%E5%B8%85%E5%A4%9A-%E5%AD%99-316a60124">LinkedIn</a>
      <a class="link-animate" href="https://space.bilibili.com/6414199">Bilibili</a>
    </div>
  </footer>

  <script>
    const i18n = {
      ja: {
        logo: 'Portfolio',
        nameMain: '孫 帥多',
        roleLabel: 'ゲームプランナー',
        worksTitle: 'ゲーム作品',
        work1Title: '元梦之星',
        work1Desc: 'パーティーゲーム',
        work2Title: 'QQ小窝',
        work2Desc: 'ソーシャルゲーム',
        animationTitle: 'アニメーション作品',
        animationLink: 'Bilibiliで見る',
        artTitle: 'アート作品集',
        performanceTitle: 'バンドパフォーマンス',
        performance1Caption: 'ライブパフォーマンス',
        performance2Caption: 'バンドショー'
      },
      en: {
        logo: 'Portfolio',
        nameMain: 'Shuaiduo Sun',
        roleLabel: 'Systems Designer / Level Designer',
        worksTitle: 'Game Works',
        work1Title: 'Fun Party',
        work1Desc: 'Party Game',
        work2Title: 'QQ Home',
        work2Desc: 'Social Game',
        animationTitle: 'Animation Works',
        animationLink: 'View on Bilibili',
        artTitle: 'Art Portfolio',
        performanceTitle: 'Band Performance',
        performance1Caption: 'Live Performance',
        performance2Caption: 'Band Show'
      },
      zh: {
        logo: 'Portfolio',
        nameMain: '孙帅多',
        roleLabel: '游戏策划',
        worksTitle: '游戏作品',
        work1Title: '元梦之星',
        work1Desc: '派对游戏',
        work2Title: 'QQ小窝',
        work2Desc: '社交游戏',
        animationTitle: '动画作品',
        animationLink: '访问哔哩哔哩主页',
        artTitle: '美术作品集',
        performanceTitle: '乐队演出',
        performance1Caption: '现场演出',
        performance2Caption: '乐队表演'
      }
    };

    let currentLang = 'en';

    function updateLanguage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : (lang === 'ja' ? 'ja' : 'en');
      
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang][key]) {
          el.innerHTML = i18n[lang][key];
        }
      });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => updateLanguage(btn.dataset.lang));
    });

    // Check URL hash for language
    const hash = window.location.hash.slice(1);
    if (['ja', 'en', 'zh'].includes(hash)) {
      updateLanguage(hash);
    }

    // Scroll reveal animation
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    };
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');
        }
      });
    }, observerOptions);
    
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

  <!-- Visitor Tracker -->
  <script>
  (function() {
    fetch('https://cf-counter.541366405.workers.dev/track').catch(()=>{});
  })();
  </script>
</body>
</html>
