<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shuaiduo Sun | Game Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #ffffff;
      --text-primary: #000000;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border: #e5e5e5;
    }
    
    html { scroll-behavior: smooth; font-size: 16px; }
    
    body {
      font-family: 'Inter', 'Noto Sans JP', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      font-weight: 400;
    }
    
    /* ========== NAV ========== */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
    }
    
    .logo {
      font-weight: 500;
      font-size: 0.875rem;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    
    /* ========== LANGUAGE SWITCHER ========== */
    .lang-switcher {
      position: fixed;
      right: 4rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .lang-btn {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      background: none;
      border: none;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.5rem 0;
      letter-spacing: 0.1em;
      transition: color 0.2s;
      font-family: inherit;
    }
    
    .lang-btn:hover { color: var(--text-secondary); }
    .lang-btn.active { color: var(--text-primary); }
    
    /* ========== HERO SECTION ========== */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 8rem 4rem;
      position: relative;
    }
    
    .hero-content {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4rem;
      align-items: start;
    }
    
    /* ========== AVATAR ========== */
    .avatar-wrap {
      position: relative;
    }
    
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      background: var(--border);
    }
    
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      
    }
    
    /* ========== INTRO TEXT ========== */
    .intro-section {
      padding-top: 0.5rem;
    }
    
    .name-main {
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }
    
    .role-label {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }
    
    .intro-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }
    
    .intro-desc {
      font-size: 1.125rem;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 3rem;
      max-width: 480px;
    }
    
    /* ========== TAGS ========== */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    
    .tag {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
      padding: 0.5rem 0;
    }
    
    .tag:not(:last-child)::after {
      content: '/';
      margin-left: 0.75rem;
      color: var(--border);
    }
    
    /* ========== WORKS SECTION ========== */
    .works {
      padding: 6rem 4rem;
      border-top: 1px solid var(--border);
    }
    
    .section-title {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4rem;
    }
    
    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 4rem;
    }
    
    .work-item {
      position: relative;
    }
    
    .work-video {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      background: var(--border);
      display: block;
    }
    
    .work-info {
      padding: 1.5rem 0;
    }
    
    .work-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }
    
    .work-desc {
      font-size: 0.875rem;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    /* ========== FOOTER ========== */
    footer {
      padding: 4rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .footer-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    
    .footer-links {
      display: flex;
      gap: 2rem;
    }
    
    .footer-links a {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    
    .footer-links a:hover { color: var(--text-primary); }
    
    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      nav { padding: 1.5rem; }
      .lang-switcher { right: 1.5rem; }
      .hero { padding: 6rem 1.5rem; }
      .hero-content {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .avatar { width: 80px; height: 80px; }
      .name-main { font-size: 2rem; }
      .works { padding: 4rem 1.5rem; }
      .works-grid { grid-template-columns: 1fr; gap: 3rem; }
      footer {
        padding: 2rem 1.5rem;
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- Language Switcher -->
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="ja">JP</button>
    <button class="lang-btn" data-lang="zh">CN</button>
  </div>

  <!-- Nav -->
  <nav>
    <a href="#" class="logo" data-i18n="logo">Portfolio</a>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <div class="avatar-wrap">
        <div class="avatar">
          <img src="/images/shuaiduosun.jpg" alt="Shuaiduo Sun">
        </div>
      </div>
      <div class="intro-section">
        <h1 class="name-main" data-i18n="nameMain">Shuaiduo Sun</h1>
        <p class="role-label" data-i18n="roleLabel">Game Planner</p>
        <p class="intro-name" data-i18n="introName">Shuaiduo Sun</p>
        <p class="intro-desc" data-i18n="introDesc">Dedicated to crafting unforgettable player experiences in<br>party games and social games. Based at Tencent Games.</p>
        <div class="tags">
          <span class="tag" data-i18n="tag1">Tencent</span>
          <span class="tag" data-i18n="tag2">Game Design</span>
          <span class="tag" data-i18n="tag3">JP / EN / CN</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Works -->
  <section class="works">
    <p class="section-title" data-i18n="worksTitle">Selected Works</p>
    <div class="works-grid">
      <div class="work-item">
        <video class="work-video" poster="/video/yuanmengzhixing-thumb.jpg" controls muted loop playsinline>
          <source src="/video/yuanmengzhixing.mp4" type="video/mp4">
        </video>
        <div class="work-info">
          <h3 class="work-title" data-i18n="work1Title">Fun Party</h3>
          <p class="work-desc" data-i18n="work1Desc">Party Game</p>
        </div>
      </div>
      <div class="work-item">
        <video class="work-video" poster="/video/qqxiaowo-thumb.jpg" controls muted loop playsinline>
          <source src="/video/qqxiaowo.mp4" type="video/mp4">
        </video>
        <div class="work-info">
          <h3 class="work-title" data-i18n="work2Title">QQ Home</h3>
          <p class="work-desc" data-i18n="work2Desc">Social Game</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p class="footer-text">© 2026 Shuaiduo Sun</p>
    <div class="footer-links">
      <a href="mailto:contact@example.com">Email</a>
      <a href="#">LinkedIn</a>
    </div>
  </footer>

  <script>
    const i18n = {
      ja: {
        logo: 'Portfolio',
        nameMain: '孫 帥多',
        roleLabel: 'ゲームプランナー',
        introName: 'ソン スイタ',
        introDesc: 'プレイヤー体験を大切に、パーティーゲームとソーシャルゲームの<br>企画・開発に取り組む。Tencent Games所属。',
        tag1: 'Tencent',
        tag2: 'Game Design',
        tag3: 'JP / EN / CN',
        worksTitle: 'Selected Works',
        work1Title: '元梦之星',
        work1Desc: 'パーティーゲーム',
        work2Title: 'QQ小窝',
        work2Desc: 'Social Game'
      },
      en: {
        logo: 'Portfolio',
        nameMain: '孫 帥多',
        roleLabel: 'ゲームプランナー',
        introName: 'ソン スイタ',
        introDesc: 'プレイヤー体験を大切に、パーティーゲームとソーシャルゲームの<br>企画・開発に取り組む。Tencent Games所属。',
        tag1: 'Tencent',
        tag2: 'Game Design',
        tag3: 'JP / EN / CN',
        worksTitle: 'Selected Works',
        work1Title: '元梦之星',
        work1Desc: 'パーティーゲーム',
        work2Title: 'QQ小窝',
        work2Desc: 'Social Game'
      },
      zh: {
        logo: 'Portfolio',
        nameMain: '孙帅多',
        roleLabel: '游戏策划',
        introName: '孙帅多',
        introDesc: '致力于为玩家打造难忘的游戏体验，<br>专注派对游戏与社交游戏策划开发。腾讯游戏任职。',
        tag1: '腾讯',
        tag2: '游戏策划',
        tag3: '日 / 英 / 中',
        worksTitle: 'Selected Works',
        work1Title: '元梦之星',
        work1Desc: '派对游戏',
        work2Title: 'QQ小窝',
        work2Desc: '社交游戏'
      }
    };

    let currentLang = 'en';

    function updateLanguage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : (lang === 'ja' ? 'ja' : 'en');
      
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[lang][key]) {
          el.innerHTML = i18n[lang][key];
        }
      });
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => updateLanguage(btn.dataset.lang));
    });

    // Check URL hash for language
    const hash = window.location.hash.slice(1);
    if (['ja', 'en', 'zh'].includes(hash)) {
      updateLanguage(hash);
    }
  </script>
</body>
</html>
