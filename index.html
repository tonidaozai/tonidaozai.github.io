<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>孫 帥多 | ゲームプランナー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #FAFBFC;
      --bg-card: #FFFFFF;
      --accent: #4F7DF9;
      --accent-soft: #EEF3FF;
      --accent-hover: #3B63E8;
      --text-primary: #1A1A2E;
      --text-secondary: #5C5C7A;
      --text-muted: #9494AD;
      --border: #E8E8F0;
      --shadow-sm: 0 2px 8px rgba(26,26,46,0.06);
      --shadow-md: 0 8px 30px rgba(26,26,46,0.08);
      --shadow-lg: 0 20px 60px rgba(26,26,46,0.1);
    }
    
    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }
    
    body {
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    
    /* Nav */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(250,251,252,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    
    nav.scrolled {
      border-bottom-color: var(--border);
    }
    
    .logo {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    
    .lang-switch {
      display: flex;
      gap: 0.25rem;
      background: var(--bg-card);
      padding: 0.25rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    
    .lang-switch a {
      padding: 0.375rem 0.875rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 7px;
      transition: all 0.2s;
    }
    
    .lang-switch a:hover {
      color: var(--text-primary);
    }
    
    .lang-switch a.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(79,125,249,0.3);
    }
    
    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 8rem 2rem 5rem;
      position: relative;
    }
    
    /* Subtle background pattern */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(79,125,249,0.08) 1px, transparent 0);
      background-size: 32px 32px;
      pointer-events: none;
    }
    
    /* Soft gradient blob */
    .hero::after {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(79,125,249,0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    
    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 700px;
    }
    
    /* Avatar */
    .avatar {
      width: 130px;
      height: 130px;
      margin: 0 auto 2.5rem;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #7B9EF9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 3.5rem;
      font-weight: 900;
      color: white;
      box-shadow: 0 12px 40px rgba(79,125,249,0.3);
      letter-spacing: -0.02em;
      animation: avatarIn 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    
    @keyframes avatarIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    /* Name */
    .hero h1 {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: clamp(3.5rem, 10vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
      color: var(--text-primary);
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
    }
    
    .hero .name-en {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.875rem, 1.5vw, 1rem);
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.35s both;
    }
    
    .hero .role {
      display: inline-block;
      font-size: 1.125rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 1.25rem;
      padding: 0.5rem 1.25rem;
      background: var(--accent-soft);
      border-radius: 100px;
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s both;
    }
    
    .hero .tagline {
      font-size: 1.125rem;
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.8;
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.65s both;
    }
    
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Scroll indicator */
    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1s both;
    }
    
    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    
    @keyframes scrollPulse {
      0%, 100% { opacity: 1; transform: scaleY(1); }
      50% { opacity: 0.5; transform: scaleY(0.7); }
    }
    
    /* Videos Section */
    .videos-section {
      padding: 6rem 2rem 8rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .section-header {
      text-align: center;
      margin-bottom: 3.5rem;
    }
    
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    
    .section-title {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
      gap: 2rem;
    }
    
    @media (max-width: 520px) {
      .video-grid { grid-template-columns: 1fr; }
      nav { padding: 1rem 1.25rem; }
      .hero { padding: 7rem 1.5rem 4rem; }
    }
    
    /* Video Card */
    .video-card {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
    }
    
    .video-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-lg), 0 0 0 1px var(--accent);
      transform: translateY(-6px);
    }
    
    .video-wrapper {
      position: relative;
      aspect-ratio: 16/9;
      background: #F0F2F8;
      overflow: hidden;
    }
    
    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .video-info {
      padding: 1.5rem 1.75rem;
    }
    
    .video-info h3 {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.375rem;
      color: var(--text-primary);
    }
    
    .video-info p {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 400;
    }
    
    /* Footer */
    footer {
      padding: 4rem 2rem 3rem;
      text-align: center;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
    }
    
    footer p {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    
    footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav id="nav">
    <a href="/" class="logo">SS</a>
    <div class="lang-switch">
      <a href="/" class="active">JP</a>
      <a href="/en">EN</a>
      <a href="/zh">中文</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <div class="avatar">S</div>
      <h1>孫 帥多</h1>
      <p class="name-en">Shuaiduo Sun</p>
      <span class="role">ゲームプランナー</span>
      <p class="tagline">
        プレイヤー体験を大切に。<br>
        Tencentでパーティーゲーム・ソーシャルゲームの企画開発を担当。
      </p>
    </div>
    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- Videos -->
  <section class="videos-section">
    <div class="section-header">
      <p class="section-label">Portfolio</p>
      <h2 class="section-title">作品動画</h2>
    </div>
    
    <div class="video-grid">
      <!-- Video 1: 元梦之星 -->
      <div class="video-card">
        <div class="video-wrapper">
          <video controls preload="metadata" poster="/video/yuanmengzhixing-thumb.jpg">
            <source src="/video/yuanmengzhixing.mp4" type="video/mp4" />
          </video>
        </div>
        <div class="video-info">
          <h3>元梦之星</h3>
          <p>パーティーゲーム / ゲーム企画・デザイン</p>
        </div>
      </div>
      
      <!-- Video 2: QQ小窝 -->
      <div class="video-card">
        <div class="video-wrapper">
          <video controls preload="metadata" poster="/video/qqxiaowo-thumb.jpg">
            <source src="/video/qq小窝.mp4" type="video/mp4" />
          </video>
        </div>
        <div class="video-info">
          <h3>QQ小窝</h3>
          <p>ソーシャルゲーム / ゲーム企画・UX設計</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2024 孫 帥多 | <a href="mailto:your.email@example.com">Contact</a></p>
  </footer>

  <script>
    // Nav background on scroll
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 20) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
