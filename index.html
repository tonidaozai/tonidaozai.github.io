<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>孫 帥多 | ゲームプランナー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #FAFBFC;
      --bg-card: #FFFFFF;
      --accent: #4F7DF9;
      --accent-soft: #EEF3FF;
      --accent-hover: #3B63E8;
      --text-primary: #1A1A2E;
      --text-secondary: #5C5C7A;
      --text-muted: #9494AD;
      --border: #E8E8F0;
      --shadow-sm: 0 2px 8px rgba(26,26,46,0.06);
      --shadow-md: 0 8px 30px rgba(26,26,46,0.08);
      --shadow-lg: 0 20px 60px rgba(26,26,46,0.1);
    }
    
    html { scroll-behavior: smooth; font-size: 16px; }
    
    body {
      font-family: 'Noto Sans JP', 'Inter', 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    /* ========== WORLD MAP BACKGROUND ========== */
    .world-map-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      opacity: 0.07;
      pointer-events: none;
    }
    
    .world-map-bg svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140%;
      max-width: 1400px;
      height: auto;
    }
    
    /* ========== NAV ========== */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(250,251,252,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    
    nav.scrolled { border-bottom-color: var(--border); }
    
    .logo {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    
    /* ========== LANGUAGE SWITCHER (Right side, vertical) ========== */
    .lang-switcher {
      position: fixed;
      right: 2rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      background: var(--bg-card);
      padding: 0.5rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }
    
    .lang-icon {
      display: block;
      margin: 0 auto;
      width: 20px;
      height: 20px;
      opacity: 0.45;
      margin-bottom: 0.375rem;
    }

    .lang-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      background: transparent;
      letter-spacing: 0.05em;
    }
    
    .lang-btn:hover {
      color: var(--text-primary);
      background: var(--accent-soft);
    }
    
    .lang-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(79,125,249,0.3);
    }
    
    .lang-flag {
      font-size: 1.25rem;
      line-height: 1;
    }
    
    /* ========== HERO SECTION ========== */
    .hero {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8rem 2rem 5rem;
      overflow: hidden;
    }
    
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(79,125,249,0.06) 1px, transparent 0);
      background-size: 28px 28px;
      z-index: 0;
      pointer-events: none;
    }
    
    .hero::after {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(79,125,249,0.07) 0%, transparent 70%);
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }
    
    /* ========== NAME AT TOP ========== */
    .hero-name {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .hero-name h1 {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: clamp(3.5rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      color: var(--text-primary);
      line-height: 1;
    }
    
    .hero-name .name-en {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }
    
    /* ========== PROFILE SECTION ========== */
    .profile-section {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 2.5rem;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(232,232,240,0.8);
      border-radius: 24px;
      padding: 2.25rem 2.75rem;
      box-shadow: var(--shadow-lg);
      max-width: 680px;
      width: 100%;
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .avatar-wrapper { flex-shrink: 0; }
    
    .avatar {
      overflow: hidden;
      width: 105px;
      height: 105px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #7B9EF9 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 2.75rem;
      font-weight: 900;
      color: white;
      box-shadow: 0 8px 28px rgba(79,125,249,0.28);
      letter-spacing: -0.02em;
    }
    
    .intro-text { flex: 1; }
    
    .intro-role {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    
    .intro-name {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.6rem;
      line-height: 1.3;
    }
    
    .intro-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    
    .intro-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-top: 0.75rem;
    }
    
    .tag {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    
    /* ========== MAP OVERLAY (bottom) ========== */
    .map-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 260px;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    
    .map-overlay svg {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1100px;
      height: 280px;
      opacity: 0.14;
    }
    
    /* ========== SCROLL INDICATOR ========== */
    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 10;
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 1s both;
    }
    
    .scroll-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    
    @keyframes scrollPulse {
      0%, 100% { opacity: 1; transform: scaleY(1); }
      50% { opacity: 0.4; transform: scaleY(0.6); }
    }
    
    /* ========== VIDEOS SECTION ========== */
    .videos-section {
      position: relative;
      z-index: 10;
      padding: 5rem 2rem 7rem;
      max-width: 1060px;
      margin: 0 auto;
    }
    
    .section-header { text-align: center; margin-bottom: 3rem; }
    
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    
    .section-title {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 1.75rem;
    }
    
    /* Video Card */
    .video-card {
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
    }
    
    .video-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-lg), 0 0 0 1px var(--accent);
      transform: translateY(-6px);
    }
    
    .video-wrapper {
      position: relative;
      aspect-ratio: 16/9;
      background: #F0F2F8;
      overflow: hidden;
    }
    
    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .video-info { padding: 1.4rem 1.6rem; }
    
    .video-info h3 {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      color: var(--text-primary);
    }
    
    .video-info p { font-size: 0.85rem; color: var(--text-muted); }
    
    /* ========== FOOTER ========== */
    footer {
      position: relative;
      z-index: 10;
      padding: 4rem 2rem 3rem;
      text-align: center;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
    }
    
    footer p { font-size: 0.875rem; color: var(--text-muted); }
    footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    footer a:hover { text-decoration: underline; }
    
    /* ========== RESPONSIVE ========== */
    @media (max-width: 640px) {
      .video-grid { grid-template-columns: 1fr; }
      .profile-section {
        flex-direction: column;
        text-align: center;
        padding: 2rem 1.5rem;
        gap: 1.5rem;
      }
      .intro-tags { justify-content: center; }
      .lang-switcher {
        right: 1rem;
        top: auto;
        bottom: 1.5rem;
        transform: none;
        flex-direction: row;
      }
      nav { padding: 1rem 1.25rem; }
      .hero { padding: 7rem 1.5rem 4rem; }
    }
  </style>
</head>
<body>

  <div class="world-map-bg">

  </div>

  <!-- Navigation -->
  <nav id="nav">
    <a href="/" class="logo">SS</a>
  </nav>

  <!-- Language Switcher (Right side, vertical) -->
  <div class="lang-switcher" id="langSwitcher">
    <svg class="lang-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
    <button class="lang-btn active" data-lang="en" onclick="switchLang('en')">
      EN
    </button>
    <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">
      JA
    </button>
    <button class="lang-btn" data-lang="zh" onclick="switchLang('zh')">
      ZH
    </button>
  </div>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-name">
      <h1 id="nameMain">孫 帥多</h1>
      <p class="name-en" id="nameEn">SHUAIDUO SUN</p>
    </div>

    <div class="profile-section">
      <div class="avatar-wrapper">
        <div class="avatar"><img src="/images/shuaiduosun.png" alt="Shuaiduo Sun" style="width:100%;height:100%;object-fit:cover;"></div>

      <div class="intro-text">
        <p class="intro-role" id="roleLabel">ゲームプランナー</p>
        <p class="intro-name" id="introName">ソン スイタ</p>

          プレイヤー体験を大切に、パーティーゲームとソーシャルゲームの<br>企画・開発に取り組む。Tencent Games所属。

        <div class="intro-tags">
          <span class="tag" id="tag1">Tencent</span>

      </div>

    <!-- Bottom map decoration -->
    <div class="map-overlay">
      <svg viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
        <g fill="#4F7DF9" opacity="0.6">
          <path d="M100,80 L150,70 L180,80 L200,100 L195,130 L175,150 L140,155 L110,145 L95,115 Z"/>

    <div class="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- Videos -->
  <section class="videos-section">
    <div class="section-header">
      <p class="section-label">Portfolio</p>
      <h2 class="section-title" id="videoTitle">作品動画</h2>
    </div>
    
    <div class="video-grid">
      <div class="video-card">
        <div class="video-wrapper">
          <video controls preload="metadata" poster="/video/yuanmengzhixing-cover2.webp">
            <source src="/video/yuanmengzhixing.mp4" type="video/mp4" />
          </video>
        </div>
        <div class="video-info">
          <h3 id="video1Title">元梦之星</h3>
          <p id="video1Desc">パーティーゲーム / ゲーム企画・デザイン</p>
        </div>
      </div>
      
      <div class="video-card">
        <div class="video-wrapper">
          <video controls preload="metadata" poster="/video/qqxiaowo-cover1.jpg">
            <source src="/video/qq小窝.mp4" type="video/mp4" />
          </video>
        </div>
        <div class="video-info">
          <h3 id="video2Title">QQ小窝</h3>
          <p id="video2Desc">ソーシャルゲーム / ゲーム企画・UX設計</p>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2024 孫 帥多 | <a href="mailto:shuaiduosun@gmail.com">Contact</a></p>
  </footer>

  <script>
    // ========== LANGUAGE DATA ==========
    const langData = {
      ja: {
        nameMain: '孫 帥多',
        nameEn: '帅多 孙',
        roleLabel: 'ゲームプランナー',
        introName: 'ソン スイタ',
        introDesc: 'プレイヤー体験を大切に、パーティーゲームとソーシャルゲームの<br>企画・開発に取り組む。Tencent Games所属。',
        tag1: 'Tencent',
        tag2: 'ゲーム企画',
        tag3: '日中英',
        videoTitle: '作品動画',
        video1Title: '元梦之星',
        video1Desc: 'パーティーゲーム / ゲーム企画・デザイン',
        video2Title: 'QQ小窝',
        video2Desc: 'ソーシャルゲーム / ゲーム企画・UX設計',
        documentTitle: '孫 帥多 | ゲームプランナー',
      },
      en: {
        nameMain: '帅多 孙',
        nameEn: '帅多 孙',
        roleLabel: 'Game Planner',
        introName: 'Shuaiduo Sun',
        introDesc: 'Dedicated to crafting unforgettable player experiences in<br>party games and social games. Based at Tencent Games.',
        tag1: 'Tencent',
        tag2: 'Game Design',
        tag3: 'JP / EN / CN',
        videoTitle: 'Video Works',
        video1Title: 'DreamStar',
        video1Desc: 'Party Game / Game Planning & Design',
        video2Title: 'QQ Nest',
        video2Desc: 'Social Game / Game Planning & UX Design',
        documentTitle: 'Shuaiduo Sun | Game Planner',
      },
      zh: {
        nameMain: '孙帅多',
        nameEn: '帅多 孙',
        roleLabel: '游戏策划',
        introName: '孙帅多',
        introDesc: '致力于为玩家打造难忘的游戏体验，<br>专注派对游戏与社交游戏策划开发。腾讯游戏任职。',
        tag1: '腾讯',
        tag2: '游戏策划',
        tag3: '日/英/中',
        videoTitle: '作品视频',
        video1Title: '元梦之星',
        video1Desc: '派对游戏 / 游戏策划与设计',
        video2Title: 'QQ小窝',
        video2Desc: '社交游戏 / 游戏策划与UX设计',
        documentTitle: '孙帅多 | 游戏策划',
      }
    };

    let currentLang = 'en';

    function switchLang(lang) {
      if (lang === currentLang) return;
      currentLang = lang;
      updateContent(lang);
      // Update URL without page reload
      const url = new URL(window.location.href);
      url.searchParams.set('lang', lang);
      history.replaceState(null, '', url.toString());
    }

    function updateContent(lang) {
      const d = langData[lang];
      if (!d) return;
      document.getElementById('nameMain').textContent = d.nameMain;
      document.getElementById('nameEn').textContent = d.nameEn;
      document.getElementById('roleLabel').textContent = d.roleLabel;
      document.getElementById('introName').textContent = d.introName;
      document.getElementById('introDesc').innerHTML = d.introDesc;
      document.getElementById('tag1').textContent = d.tag1;
      document.getElementById('tag2').textContent = d.tag2;
      document.getElementById('tag3').textContent = d.tag3;
      document.getElementById('videoTitle').textContent = d.videoTitle;
      document.getElementById('video1Title').textContent = d.video1Title;
      document.getElementById('video1Desc').textContent = d.video1Desc;
      document.getElementById('video2Title').textContent = d.video2Title;
      document.getElementById('video2Desc').textContent = d.video2Desc;
      document.title = d.documentTitle;
      document.documentElement.lang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    // Init: read lang from URL on page load
    (function initLang() {
      const params = new URLSearchParams(window.location.search);
      const urlLang = params.get('lang');
      if (urlLang && langData[urlLang]) {
        currentLang = urlLang;
      }
      updateContent(currentLang);
    })();

    // Nav scroll effect
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 20);
    });
  </script>
</body>
</html>
